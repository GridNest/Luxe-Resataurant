<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUXE Admin - Menu Items</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <style>
    .img-preview { max-width: 200px; max-height: 150px; border-radius: 8px; object-fit: cover; border: 2px solid rgba(201,169,110,0.3); }
    .img-preview-container { position: relative; display: inline-block; }
    .img-preview-remove { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .img-preview-remove:hover { background: #dc2626; }
  </style>
</head>
<body class="bg-[#0b0a0a] text-[#f0ece4] min-h-screen flex">
  <aside class="w-64 bg-[#111] border-r border-white/10 flex flex-col fixed h-full z-30">
    <div class="p-6 border-b border-white/10">
      <h1 class="text-2xl font-bold gold tracking-widest">LUXE</h1>
      <p class="text-white/40 text-xs mt-1">Admin Panel</p>
    </div>
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
      <a href="../dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4CA;</span> Dashboard</a>
      <a href="hero.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F5BC;</span> Hero Section</a>
      <a href="about.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4D6;</span> About</a>
      <a href="categories.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4C2;</span> Categories</a>
      <a href="menu.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><span>&#x1F37D;</span> Menu Items</a>
      <a href="gallery.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F5BC;</span> Gallery</a>
      <a href="testimonials.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4AC;</span> Testimonials</a>
      <a href="contact.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4DE;</span> Contact</a>
      <a href="settings.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x2699;</span> Settings</a>
    </nav>
    <div class="p-4 border-t border-white/10">
      <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-white/50 hover:bg-red-500/10 hover:text-red-400 transition text-sm"><span>&#x1F6AA;</span> Logout</button>
    </div>
  </aside>

  <main class="flex-1 ml-64 p-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h2 class="text-2xl font-semibold">Menu Items</h2>
        <p class="text-white/40 text-sm mt-1">Manage your restaurant menu</p>
      </div>
      <button onclick="openModal()" class="btn-gold px-4 py-2 rounded-lg text-sm">+ Add Item</button>
    </div>

    <div id="loadingState" class="space-y-4">
      <div class="glass rounded-xl p-4 animate-pulse" style="height:60px"></div>
      <div class="glass rounded-xl p-4 animate-pulse" style="height:60px"></div>
      <div class="glass rounded-xl p-4 animate-pulse" style="height:60px"></div>
    </div>

    <div id="tableContainer" class="glass rounded-xl overflow-hidden hidden">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Type</th>
              <th>Popular</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="menuTable"></tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="flex items-center justify-between mb-6">
        <h3 id="modalTitle" class="text-lg font-semibold">Add Menu Item</h3>
        <button onclick="closeModal()" class="text-white/50 hover:text-white text-xl">&times;</button>
      </div>
      <form id="menuForm" class="space-y-4">
        <input type="hidden" id="itemId" />
        <input type="hidden" id="removeImageFlag" value="false" />
        <div>
          <label class="block text-sm text-white/60 mb-1">Name</label>
          <input type="text" id="itemName" placeholder="Item name" required />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Category</label>
          <select id="itemCategory" required></select>
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Description</label>
          <textarea id="itemDescription" rows="2" placeholder="Brief description"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-white/60 mb-1">Price ($)</label>
            <input type="number" id="itemPrice" min="0" step="0.01" required />
          </div>
          <div>
            <label class="block text-sm text-white/60 mb-1">Display Order</label>
            <input type="number" id="itemOrder" value="0" min="0" />
          </div>
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Image URL</label>
          <input type="text" id="itemImage" placeholder="https://..." />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Or Upload Image File</label>
          <input type="file" id="itemImageFile" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-600 transition" />
        </div>
        <div id="imagePreviewContainer" class="hidden">
          <label class="block text-sm text-white/60 mb-1">Image Preview</label>
          <div class="img-preview-container inline-block">
            <img id="imagePreview" src="" alt="Preview" class="img-preview" />
            <button type="button" id="removeImageBtn" class="img-preview-remove" title="Remove image">&times;</button>
          </div>
        </div>
        <div class="flex gap-6">
          <label class="flex items-center gap-2 text-sm text-white/60">
            <input type="checkbox" id="itemVeg" class="w-4 h-4 accent-green-500" /> Veg
          </label>
          <label class="flex items-center gap-2 text-sm text-white/60">
            <input type="checkbox" id="itemPopular" class="w-4 h-4 accent-yellow-600" /> Popular
          </label>
        </div>
        <div class="flex gap-3">
          <button type="submit" class="btn-gold px-6 py-2 rounded-lg text-sm">Save</button>
          <button type="button" onclick="closeModal()" class="bg-white/5 hover:bg-white/10 px-6 py-2 rounded-lg text-sm transition">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    checkAuth();

    let menuItems = [];
    let categories = [];

    async function loadData() {
      const [items, cats] = await Promise.all([
        apiFetch('/menu/all'),
        apiFetch('/categories/all')
      ]);
      menuItems = items || [];
      categories = cats || [];
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('tableContainer').classList.remove('hidden');
      renderTable();
      renderCategorySelect();
    }

    function renderCategorySelect() {
      const select = document.getElementById('itemCategory');
      select.innerHTML = categories.map(c => `<option value="${c._id}">${c.name}</option>`).join('');
    }

    function renderTable() {
      const tbody = document.getElementById('menuTable');
      tbody.innerHTML = menuItems.map(item => {
        const catName = item.categoryId?.name || 'Unknown';
        const imgUrl = getCacheBustedUrl(item.image);
        return `
          <tr>
            <td><img src="${imgUrl}" class="w-12 h-12 rounded-lg object-cover" onerror="this.src='data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48"><rect fill="#1a1818" width="48" height="48"/><text fill="#666" font-family="sans-serif" font-size="10" x="24" y="24" text-anchor="middle">N/A</text></svg>')}'" /></td>
            <td class="font-medium">${item.name}</td>
            <td class="text-white/40">${catName}</td>
            <td class="gold">$${item.price}</td>
            <td><span class="badge ${item.veg ? 'badge-green' : 'badge-red'}">${item.veg ? 'Veg' : 'Non-Veg'}</span></td>
            <td>${item.popular ? '<span class="badge badge-gold">Popular</span>' : '-'}</td>
            <td>
              <button onclick="editItem('${item._id}')" class="text-white/50 hover:text-white text-sm mr-3">Edit</button>
              <button onclick="deleteItem('${item._id}')" class="text-red-400 hover:text-red-300 text-sm">Delete</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function showImagePreview(url) {
      const container = document.getElementById('imagePreviewContainer');
      const preview = document.getElementById('imagePreview');
      if (url) {
        preview.src = getCacheBustedUrl(url);
        container.classList.remove('hidden');
      } else {
        container.classList.add('hidden');
      }
    }

    function openModal(id = null) {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modalTitle').textContent = id ? 'Edit Menu Item' : 'Add Menu Item';
      document.getElementById('itemId').value = id || '';
      document.getElementById('removeImageFlag').value = 'false';
      document.getElementById('imagePreviewContainer').classList.add('hidden');
      document.getElementById('itemImageFile').value = '';

      if (id) {
        const item = menuItems.find(i => i._id === id);
        if (item) {
          document.getElementById('itemName').value = item.name;
          document.getElementById('itemCategory').value = item.categoryId?._id || '';
          document.getElementById('itemDescription').value = item.description || '';
          document.getElementById('itemPrice').value = item.price;
          document.getElementById('itemOrder').value = item.displayOrder || 0;
          document.getElementById('itemImage').value = item.image || '';
          document.getElementById('itemVeg').checked = item.veg;
          document.getElementById('itemPopular').checked = item.popular;
          showImagePreview(item.image);
        }
      } else {
        document.getElementById('menuForm').reset();
      }
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('imagePreviewContainer').classList.add('hidden');
    }

    function editItem(id) {
      openModal(id);
    }

    document.getElementById('itemImageFile').addEventListener('change', function() {
      if (this.files.length > 0) {
        const file = this.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
          showImagePreview(e.target.result);
        };
        reader.readAsDataURL(file);
        document.getElementById('itemImage').value = '';
      }
    });

    document.getElementById('itemImage').addEventListener('input', function() {
      if (this.value) {
        showImagePreview(this.value);
        document.getElementById('itemImageFile').value = '';
      } else {
        document.getElementById('imagePreviewContainer').classList.add('hidden');
      }
    });

    document.getElementById('removeImageBtn').addEventListener('click', function() {
      document.getElementById('removeImageFlag').value = 'true';
      document.getElementById('imagePreviewContainer').classList.add('hidden');
      document.getElementById('itemImage').value = '';
      document.getElementById('itemImageFile').value = '';
      showToast('Image marked for removal', 'info');
    });

    document.getElementById('menuForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('itemId').value;
      const fileInput = document.getElementById('itemImageFile');
      const imageUrlInput = document.getElementById('itemImage');
      const removeFlag = document.getElementById('removeImageFlag').value;

      if (fileInput.files.length > 0) {
        showToast('Uploading image...', 'info');
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        formData.append('name', document.getElementById('itemName').value);
        formData.append('categoryId', document.getElementById('itemCategory').value);
        formData.append('description', document.getElementById('itemDescription').value);
        formData.append('price', parseFloat(document.getElementById('itemPrice').value));
        formData.append('displayOrder', parseInt(document.getElementById('itemOrder').value));
        formData.append('veg', document.getElementById('itemVeg').checked);
        formData.append('popular', document.getElementById('itemPopular').checked);

        try {
          let result;
          if (id) {
            result = await apiUpload(`/menu/${id}`, formData, 'PUT');
            showToast('Menu item updated successfully');
          } else {
            result = await apiUpload('/menu', formData, 'POST');
            showToast('Menu item created successfully');
          }
          closeModal();
          if (result && result.data) {
            if (id) {
              const idx = menuItems.findIndex(i => i._id === id);
              if (idx !== -1) menuItems[idx] = result.data;
            } else {
              menuItems.push(result.data);
            }
          } else {
            await loadData();
          }
          renderTable();
        } catch (err) {
          showToast(err.message || 'Upload failed', 'error');
        }
      } else {
        const body = {
          name: document.getElementById('itemName').value,
          categoryId: document.getElementById('itemCategory').value,
          description: document.getElementById('itemDescription').value,
          price: parseFloat(document.getElementById('itemPrice').value),
          displayOrder: parseInt(document.getElementById('itemOrder').value),
          image: imageUrlInput.value || undefined,
          veg: document.getElementById('itemVeg').checked,
          popular: document.getElementById('itemPopular').checked
        };

        if (removeFlag === 'true') {
          body.removeImage = 'true';
          body.image = '';
        }

        try {
          let result;
          if (id) {
            result = await apiPut(`/menu/${id}`, body);
            showToast('Menu item updated successfully');
          } else {
            result = await apiPost('/menu', body);
            showToast('Menu item created successfully');
          }
          closeModal();
          if (result && result.data) {
            if (id) {
              const idx = menuItems.findIndex(i => i._id === id);
              if (idx !== -1) menuItems[idx] = result.data;
            } else {
              menuItems.push(result.data);
            }
          } else {
            await loadData();
          }
          renderTable();
        } catch (err) {
          showToast(err.message || 'Save failed', 'error');
        }
      }
    });

    async function deleteItem(id) {
      if (!confirm('Are you sure you want to delete this item?')) return;
      try {
        await apiDelete(`/menu/${id}`);
        showToast('Menu item deleted successfully');
        menuItems = menuItems.filter(i => i._id !== id);
        renderTable();
      } catch (err) {
        showToast(err.message || 'Delete failed', 'error');
      }
    }

    loadData();

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiPost('/auth/logout');
      localStorage.removeItem('token');
      localStorage.removeItem('admin');
      window.location.href = '/admin/index.html';
    });
  </script>
</body>
</html>
