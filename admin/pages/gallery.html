<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUXE Admin - Gallery</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
  <style>
    .img-preview { max-width: 200px; max-height: 150px; border-radius: 8px; object-fit: cover; border: 2px solid rgba(201,169,110,0.3); }
    .img-preview-container { position: relative; display: inline-block; }
    .img-preview-remove { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .img-preview-remove:hover { background: #dc2626; }
  </style>
</head>
<body class="bg-[#0b0a0a] text-[#f0ece4] min-h-screen flex">
  <aside class="w-64 bg-[#111] border-r border-white/10 flex flex-col fixed h-full z-30">
    <div class="p-6 border-b border-white/10">
      <h1 class="text-2xl font-bold gold tracking-widest">LUXE</h1>
      <p class="text-white/40 text-xs mt-1">Admin Panel</p>
    </div>
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
      <a href="../dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4CA;</span> Dashboard</a>
      <a href="hero.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F5BC;</span> Hero Section</a>
      <a href="about.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4D6;</span> About</a>
      <a href="categories.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4C2;</span> Categories</a>
      <a href="menu.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F37D;</span> Menu Items</a>
      <a href="gallery.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><span>&#x1F5BC;</span> Gallery</a>
      <a href="testimonials.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4AC;</span> Testimonials</a>
      <a href="contact.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4DE;</span> Contact</a>
      <a href="settings.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x2699;</span> Settings</a>
    </nav>
    <div class="p-4 border-t border-white/10">
      <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-white/50 hover:bg-red-500/10 hover:text-red-400 transition text-sm"><span>&#x1F6AA;</span> Logout</button>
    </div>
  </aside>

  <main class="flex-1 ml-64 p-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h2 class="text-2xl font-semibold">Gallery</h2>
        <p class="text-white/40 text-sm mt-1">Manage gallery images</p>
      </div>
      <button onclick="openModal()" class="btn-gold px-4 py-2 rounded-lg text-sm">+ Add Image</button>
    </div>

    <div id="loadingState" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <div class="animate-pulse rounded-xl overflow-hidden" style="height:192px;background:rgba(255,255,255,0.05)"></div>
      <div class="animate-pulse rounded-xl overflow-hidden" style="height:192px;background:rgba(255,255,255,0.05)"></div>
      <div class="animate-pulse rounded-xl overflow-hidden" style="height:192px;background:rgba(255,255,255,0.05)"></div>
      <div class="animate-pulse rounded-xl overflow-hidden" style="height:192px;background:rgba(255,255,255,0.05)"></div>
    </div>

    <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 hidden"></div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-content">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-lg font-semibold">Add Gallery Image</h3>
        <button onclick="closeModal()" class="text-white/50 hover:text-white text-xl">&times;</button>
      </div>
      <form id="galleryForm" class="space-y-4">
        <div>
          <label class="block text-sm text-white/60 mb-1">Image URL</label>
          <input type="text" id="imageUrl" placeholder="https://..." />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Or Upload Image File</label>
          <input type="file" id="imageFile" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-600 transition" />
        </div>
        <div id="imagePreviewContainer" class="hidden">
          <label class="block text-sm text-white/60 mb-1">Image Preview</label>
          <div class="img-preview-container inline-block">
            <img id="imagePreview" src="" alt="Preview" class="img-preview" />
            <button type="button" id="removePreviewBtn" class="img-preview-remove" title="Remove preview">&times;</button>
          </div>
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Title (optional)</label>
          <input type="text" id="imageTitle" placeholder="Image title" />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Display Order</label>
          <input type="number" id="imageOrder" value="0" min="0" />
        </div>
        <div class="flex gap-3">
          <button type="submit" class="btn-gold px-6 py-2 rounded-lg text-sm">Save</button>
          <button type="button" onclick="closeModal()" class="bg-white/5 hover:bg-white/10 px-6 py-2 rounded-lg text-sm transition">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    checkAuth();

    let galleryImages = [];

    async function loadGallery() {
      galleryImages = await apiFetch('/gallery') || [];
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('galleryGrid').classList.remove('hidden');
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById('galleryGrid');
      grid.innerHTML = (galleryImages || []).map(img => `
        <div class="relative group rounded-xl overflow-hidden" data-id="${img._id}">
          <img src="${getCacheBustedUrl(img.image)}" class="w-full h-48 object-cover" onerror="this.src='data:image/svg+xml,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300"><rect fill="#1a1818" width="400" height="300"/><text fill="#666" font-family="sans-serif" font-size="14" x="200" y="150" text-anchor="middle">Image Not Available</text></svg>')}'" />
          <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center gap-3">
            <button onclick="deleteImage('${img._id}')" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-sm transition">Delete</button>
          </div>
          ${img.title ? `<div class="absolute bottom-0 left-0 right-0 bg-black/60 px-3 py-2 text-sm">${img.title}</div>` : ''}
        </div>
      `).join('');
    }

    function showImagePreview(url) {
      const container = document.getElementById('imagePreviewContainer');
      const preview = document.getElementById('imagePreview');
      if (url) {
        preview.src = url.startsWith('data:') ? url : getCacheBustedUrl(url);
        container.classList.remove('hidden');
      } else {
        container.classList.add('hidden');
      }
    }

    function openModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('galleryForm').reset();
      document.getElementById('imagePreviewContainer').classList.add('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('galleryForm').reset();
      document.getElementById('imagePreviewContainer').classList.add('hidden');
    }

    document.getElementById('imageFile').addEventListener('change', function() {
      if (this.files.length > 0) {
        const reader = new FileReader();
        reader.onload = function(e) { showImagePreview(e.target.result); };
        reader.readAsDataURL(this.files[0]);
        document.getElementById('imageUrl').value = '';
      }
    });

    document.getElementById('imageUrl').addEventListener('input', function() {
      if (this.value) {
        showImagePreview(this.value);
        document.getElementById('imageFile').value = '';
      } else {
        document.getElementById('imagePreviewContainer').classList.add('hidden');
      }
    });

    document.getElementById('removePreviewBtn').addEventListener('click', function() {
      document.getElementById('imagePreviewContainer').classList.add('hidden');
      document.getElementById('imageUrl').value = '';
      document.getElementById('imageFile').value = '';
    });

    document.getElementById('galleryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const fileInput = document.getElementById('imageFile');
        const imageUrlInput = document.getElementById('imageUrl');

        if (fileInput.files.length > 0) {
          showToast('Uploading image...', 'info');
          const formData = new FormData();
          formData.append('image', fileInput.files[0]);
          formData.append('title', document.getElementById('imageTitle').value);
          formData.append('displayOrder', parseInt(document.getElementById('imageOrder').value));

          const result = await apiUpload('/gallery', formData);
          if (result && result.data) {
            galleryImages.push(result.data);
          }
        } else if (imageUrlInput.value) {
          const result = await apiPost('/gallery', {
            image: imageUrlInput.value,
            title: document.getElementById('imageTitle').value,
            displayOrder: parseInt(document.getElementById('imageOrder').value)
          });
          if (result && result.data) {
            galleryImages.push(result.data);
          }
        } else {
          throw new Error('Please select an image file to upload or enter an image URL');
        }

        showToast('Image added successfully');
        closeModal();
        renderGrid();
      } catch (err) {
        showToast(err.message || 'Upload failed', 'error');
      }
    });

    async function deleteImage(id) {
      if (!confirm('Are you sure you want to delete this image?')) return;
      try {
        await apiDelete(`/gallery/${id}`);
        showToast('Image deleted successfully');
        galleryImages = galleryImages.filter(i => i._id !== id);
        renderGrid();
      } catch (err) {
        showToast(err.message || 'Delete failed', 'error');
      }
    }

    loadGallery();

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiPost('/auth/logout');
      localStorage.removeItem('token');
      localStorage.removeItem('admin');
      window.location.href = '/admin/index.html';
    });
  </script>
</body>
</html>
