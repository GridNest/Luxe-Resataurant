<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUXE Admin - About</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="bg-[#0b0a0a] text-[#f0ece4] min-h-screen flex">
  <aside class="w-64 bg-[#111] border-r border-white/10 flex flex-col fixed h-full z-30">
    <div class="p-6 border-b border-white/10">
      <h1 class="text-2xl font-bold gold tracking-widest">LUXE</h1>
      <p class="text-white/40 text-xs mt-1">Admin Panel</p>
    </div>
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
      <a href="../dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>📊</span> Dashboard</a>
      <a href="hero.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>🖼️</span> Hero Section</a>
      <a href="about.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><span>📖</span> About</a>
      <a href="categories.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>📂</span> Categories</a>
      <a href="menu.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>🍽️</span> Menu Items</a>
      <a href="gallery.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>🖼️</span> Gallery</a>
      <a href="testimonials.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>💬</span> Testimonials</a>
      <a href="contact.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>📞</span> Contact</a>
      <a href="settings.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>⚙️</span> Settings</a>
    </nav>
    <div class="p-4 border-t border-white/10">
      <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-white/50 hover:bg-red-500/10 hover:text-red-400 transition text-sm"><span>🚪</span> Logout</button>
    </div>
  </aside>

  <main class="flex-1 ml-64 p-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h2 class="text-2xl font-semibold">About Section</h2>
        <p class="text-white/40 text-sm mt-1">Manage the about section content</p>
      </div>
      <a href="../dashboard.html" class="text-sm text-white/50 hover:text-white transition">← Back to Dashboard</a>
    </div>

    <div class="glass rounded-xl p-6 max-w-2xl">
      <form id="aboutForm" class="space-y-5">
        <div>
          <label class="block text-sm text-white/60 mb-1">Heading</label>
          <input type="text" id="heading" placeholder="Our Story" />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Description</label>
          <textarea id="description" rows="4" placeholder="Tell your story..."></textarea>
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Chef Image URL</label>
          <input type="text" id="chefImage" placeholder="https://..." />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Or Upload Chef Image File</label>
          <input type="file" id="chefImageFile" accept="image/*" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-yellow-600 transition" />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Experience</label>
          <input type="text" id="experience" placeholder="12+ years" />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Features (one per line)</label>
          <textarea id="features" rows="3" placeholder="100% farm-to-table&#10;Michelin-starred service"></textarea>
        </div>
        <button type="submit" class="btn-gold px-6 py-3 rounded-lg text-sm uppercase tracking-wider">Save Changes</button>
      </form>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    checkAuth();

    async function loadAbout() {
      const data = await apiFetch('/about');
      if (data) {
        document.getElementById('heading').value = data.heading || '';
        document.getElementById('description').value = data.description || '';
        document.getElementById('chefImage').value = data.chefImage || '';
        document.getElementById('experience').value = data.experience || '';
        document.getElementById('features').value = (data.features || []).join('\n');
      }
    }

    document.getElementById('aboutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fileInput = document.getElementById('chefImageFile');
      const features = document.getElementById('features').value.split('\n').filter(f => f.trim());

      if (fileInput.files.length > 0) {
        const formData = new FormData();
        formData.append('chefImage', fileInput.files[0]);
        formData.append('heading', document.getElementById('heading').value);
        formData.append('description', document.getElementById('description').value);
        formData.append('experience', document.getElementById('experience').value);
        formData.append('features', JSON.stringify(features));

        try {
          await apiUpload('/about', formData, 'PUT');
          showToast('About section updated successfully');
          loadAbout();
          fileInput.value = '';
        } catch (err) {
          showToast(err.message, 'error');
        }
      } else {
        try {
          await apiPut('/about', {
            heading: document.getElementById('heading').value,
            description: document.getElementById('description').value,
            chefImage: document.getElementById('chefImage').value,
            experience: document.getElementById('experience').value,
            features: features
          });
          showToast('About section updated successfully');
          loadAbout();
        } catch (err) {
          showToast(err.message, 'error');
        }
      }
    });

    loadAbout();

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiPost('/auth/logout');
      localStorage.removeItem('token');
      localStorage.removeItem('admin');
      window.location.href = '/admin/index.html';
    });
  </script>
</body>
</html>
