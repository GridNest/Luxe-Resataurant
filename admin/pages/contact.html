<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUXE Admin - Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="bg-[#0b0a0a] text-[#f0ece4] min-h-screen flex">
  <aside class="w-64 bg-[#111] border-r border-white/10 flex flex-col fixed h-full z-30">
    <div class="p-6 border-b border-white/10">
      <h1 class="text-2xl font-bold gold tracking-widest">LUXE</h1>
      <p class="text-white/40 text-xs mt-1">Admin Panel</p>
    </div>
    <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
      <a href="../dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4CA;</span> Dashboard</a>
      <a href="hero.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F5BC;</span> Hero Section</a>
      <a href="about.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4D6;</span> About</a>
      <a href="categories.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4C2;</span> Categories</a>
      <a href="menu.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F37D;</span> Menu Items</a>
      <a href="gallery.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F5BC;</span> Gallery</a>
      <a href="testimonials.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x1F4AC;</span> Testimonials</a>
      <a href="contact.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-sm"><span>&#x1F4DE;</span> Contact</a>
      <a href="settings.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-white/70 hover:bg-white/5 hover:text-white transition text-sm"><span>&#x2699;</span> Settings</a>
    </nav>
    <div class="p-4 border-t border-white/10">
      <button id="logoutBtn" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-white/50 hover:bg-red-500/10 hover:text-red-400 transition text-sm"><span>&#x1F6AA;</span> Logout</button>
    </div>
  </aside>

  <main class="flex-1 ml-64 p-8">
    <div class="flex items-center justify-between mb-8">
      <div>
        <h2 class="text-2xl font-semibold">Contact Information</h2>
        <p class="text-white/40 text-sm mt-1">Manage contact details and social links</p>
      </div>
      <a href="../dashboard.html" class="text-sm text-white/50 hover:text-white transition">&larr; Back to Dashboard</a>
    </div>

    <div class="glass rounded-xl p-6 max-w-2xl">
      <form id="contactForm" class="space-y-5">
        <div>
          <label class="block text-sm text-white/60 mb-1">Restaurant Name</label>
          <input type="text" id="restaurantName" placeholder="LUXE" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-white/60 mb-1">Phone</label>
            <input type="text" id="phone" placeholder="+1 (212) 555-0199" />
          </div>
          <div>
            <label class="block text-sm text-white/60 mb-1">WhatsApp</label>
            <input type="text" id="whatsapp" placeholder="+12125550199" />
          </div>
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Email</label>
          <input type="email" id="email" placeholder="reservations@luxe.restaurant" />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Address</label>
          <input type="text" id="address" placeholder="101 Park Ave, New York, NY 10022" />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Opening Hours</label>
          <input type="text" id="openingHours" placeholder="Mon-Sun: 5:00 PM - 11:00 PM" />
        </div>
        <div>
          <label class="block text-sm text-white/60 mb-1">Google Map Embed URL</label>
          <input type="text" id="googleMap" placeholder="https://maps.google.com/..." />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-white/60 mb-1">Facebook URL</label>
            <input type="text" id="facebook" placeholder="https://facebook.com/..." />
          </div>
          <div>
            <label class="block text-sm text-white/60 mb-1">Instagram URL</label>
            <input type="text" id="instagram" placeholder="https://instagram.com/..." />
          </div>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm text-white/60 mb-1">YouTube URL</label>
            <input type="text" id="youtube" placeholder="https://youtube.com/..." />
          </div>
          <div>
            <label class="block text-sm text-white/60 mb-1">Twitter URL</label>
            <input type="text" id="twitter" placeholder="https://twitter.com/..." />
          </div>
        </div>
        <button type="submit" class="btn-gold px-6 py-3 rounded-lg text-sm uppercase tracking-wider">Save Changes</button>
      </form>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    checkAuth();

    async function loadContact() {
      const data = await apiFetch('/contact');
      if (data) {
        document.getElementById('restaurantName').value = data.restaurantName || '';
        document.getElementById('phone').value = data.phone || '';
        document.getElementById('whatsapp').value = data.whatsapp || '';
        document.getElementById('email').value = data.email || '';
        document.getElementById('address').value = data.address || '';
        document.getElementById('openingHours').value = data.openingHours || '';
        document.getElementById('googleMap').value = data.googleMap || '';
        document.getElementById('facebook').value = data.facebook || '';
        document.getElementById('instagram').value = data.instagram || '';
        document.getElementById('youtube').value = data.youtube || '';
        document.getElementById('twitter').value = data.twitter || '';
      }
    }

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await apiPut('/contact', {
          restaurantName: document.getElementById('restaurantName').value,
          phone: document.getElementById('phone').value,
          whatsapp: document.getElementById('whatsapp').value,
          email: document.getElementById('email').value,
          address: document.getElementById('address').value,
          openingHours: document.getElementById('openingHours').value,
          googleMap: document.getElementById('googleMap').value,
          facebook: document.getElementById('facebook').value,
          instagram: document.getElementById('instagram').value,
          youtube: document.getElementById('youtube').value,
          twitter: document.getElementById('twitter').value
        });
        showToast('Contact information updated successfully');
      } catch (err) {
        showToast(err.message || 'Save failed', 'error');
      }
    });

    loadContact();

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await apiPost('/auth/logout');
      localStorage.removeItem('token');
      localStorage.removeItem('admin');
      window.location.href = '/admin/index.html';
    });
  </script>
</body>
</html>
